<html lang="ko">

    <title>Vintage Travel Archives</title>

    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f2e8d5;
            --text-color: #3e2f24;
            --accent-color: #7d4a25;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Gowun Batang', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            line-height: 1.8;
        }

        header {
            margin: 60px 0;
            text-align: center;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-style: italic;
            letter-spacing: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            margin-bottom: 10px;
        }

        .flag-menu {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .flag-item {
            cursor: pointer;
            width: 100px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: grayscale(40%) sepia(20%);
        }

        .flag-item:hover {
            transform: translateY(-10px) scale(1.1);
            filter: grayscale(0%);
        }

        .flag-item img {
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 4px solid #fff;
        }

            width: 85%;
            max-width: 900px;

            padding: 50px;

            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            display: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
