<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vintage Travel Archives</title>
    <!-- 빈티지한 서체 (고운 바탕 & Playfair Display) -->
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f2e8d5;
            --text-color: #3e2f24;
            --accent-color: #7d4a25;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Gowun Batang', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
            line-height: 1.8;
        }

        header {
            margin: 60px 0;
            text-align: center;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 5rem;
            font-style: italic;
            letter-spacing: 12px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--accent-color);
            display: inline-block;
            margin-bottom: 10px;
        }

        .flag-menu {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }

        .flag-item {
            cursor: pointer;
            width: 100px;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: grayscale(40%) sepia(20%);
        }

        .flag-item:hover {
            transform: translateY(-10px) scale(1.1);
            filter: grayscale(0%);
        }

        .flag-item img {
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            border: 4px solid #fff;
        }

        #content-area {
            width: 80%;
            max-width: 850px;
            min-height: 400px;
            margin-bottom: 100px;
            padding: 50px;
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            display: none;
        }

        @keyframes suckInEffect {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }

        .animate-in {
            display: block !important;
            animation: suckInEffect 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        .country-title {
            font-size: 2.5rem;
            color: var(--accent-color);
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px dashed var(--accent-color);
            padding-bottom: 10px;
        }

        .section-label {
            font-weight: bold;
            font-size: 1.2rem;
            color: #5d4037;
            margin-top: 30px;
            display: block;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .description-text {
            font-size: 1.1rem;
            text-align: justify;
            color: #444;
            margin-top: 10px;
            white-space: pre-line;
        }

        /* --- 사진 갤러리 스타일 추가 --- */
        .photo-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .photo-gallery img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 6px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .photo-gallery img:hover {
            transform: scale(1.05) rotate(2deg);
            z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <div class="title">Travel</div>
        <p style="font-style: italic; color: #888;">Discover the timeless beauty of the world</p>
    </header>

    <div class="flag-menu">
        <div class="flag-item" onclick="showCountry('hungary')"><img src="https://flagcdn.com/hu.svg" alt="Hungary"></div>
        <div class="flag-item" onclick="showCountry('czech')"><img src="https://flagcdn.com/cz.svg" alt="Czech Republic"></div>
        <div class="flag-item" onclick="showCountry('austria')"><img src="https://flagcdn.com/at.svg" alt="Austria"></div>
        <div class="flag-item" onclick="showCountry('newyork')"><img src="https://flagcdn.com/us.svg" alt="USA"></div>
    </div>

    <div id="content-area"></div>

    <script>
        const countryInfo = {
            hungary: {
                title: "다뉴브의 진주, 헝가리",
                intro: "동유럽의 심장부인 헝가리는 수천 년의 역사와 찬란한 마자르 문화가 살아 숨 쉬는 곳입니다. 특히 밤이 되면 황금빛으로 물드는 부다페스트의 전경은 세상에서 가장 아름다운 야경 중 하나로 손꼽힙니다.",
                places: "• 부다페스트 국회의사당: 다뉴브 강변에 우뚝 솟은 네오고딕 양식의 걸작으로, 헝가리 주권의 상징입니다.\n• 세체니 온천: 유럽 최대 규모의 온천 중 하나로, 노란 고전 양식 건물 안에서 즐기는 온천욕은 여행의 피로를 씻어줍니다.\n• 어부의 요새: 부다 성 지구에 위치한 이곳은 마치 동화 속 성곽 같은 모습을 하고 있으며 시내를 한눈에 조망하기 가장 좋습니다.",
                food: "• 굴라쉬(Goulash): 고기와 채소, 파프리카 가루를 듬뿍 넣어 끓인 헝가리식 전통 스튜로 매콤하고 진한 맛이 일품입니다.\n• 토카이 와인: '왕의 와인, 와인의 왕'이라 불리는 세계적인 디저트 와인으로 달콤한 풍미가 특징입니다.",
                // 사진 파일명 배열 추가
                photos: ["hungary (1).jpg", "hungary (2).jpg", "hungary (3).jpg", "hungary (4).jpg", "hungary (5).jpg"]
            },
            czech: {
                title: "중세의 낭만, 체코",
                intro: "붉은 지붕과 돌담길이 가득한 체코는 마치 시간이 멈춘 듯한 중세의 분위기를 간직하고 있습니다.",
                places: "• 프라하 성\n• 카를교\n• 구시가지 광장",
                food: "• 꼴레뇨\n• 체코 맥주\n• 뜨르들로",
                photos: [] 
            },
            austria: {
                title: "예술과 음악의 나라, 오스트리아",
                intro: "모차르트와 베토벤의 선율이 흐르는 오스트리아입니다.",
                places: "• 할슈타트\n• 쇤브룬 궁전\n• 벨베데레 궁전",
                food: "• 비너 슈니첼\n• 자허 토르테",
                photos: []
            },
            newyork: {
                title: "세계의 교차로, 뉴욕",
                intro: "미국을 넘어 세계 경제와 문화의 중심지인 뉴욕입니다.",
                places: "• 타임스퀘어\n• 센트럴 파크\n• 자유의 여신상",
                food: "• 뉴욕 스타일 피자\n• 매그놀리아 컵케이크",
                photos: []
            }
        };

        function showCountry(id) {
            const area = document.getElementById('content-area');
            const data = countryInfo[id];

            area.classList.remove('animate-in');
            
            setTimeout(() => {
                // 사진 HTML 생성
                let photoHtml = "";
                if (data.photos && data.photos.length > 0) {
                    photoHtml = `
                        <span class="section-label">📸 여행 사진첩</span>
                        <div class="photo-gallery">
                            ${data.photos.map(p => `<img src="${encodeURI(p)}" alt="Hungary Photo">`).join('')}
                        </div>
                    `;
                }

                area.innerHTML = `
                    <div class="country-title">${data.title}</div>
                    <p class="description-text" style="font-weight: bold;">${data.intro}</p>
                    
                    <span class="section-label">🏛 가봐야 할 명소</span>
                    <p class="description-text">${data.places}</p>
                    
                    <span class="section-label">🍴 꼭 먹어봐야 할 음식</span>
                    <p class="description-text">${data.food}</p>

                    ${photoHtml}
                `;
                area.classList.add('animate-in');
                area.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);
        }
    </script>
</body>
</html>
