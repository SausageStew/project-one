    box-shadow: 0 10px 20px rgba(0,0,0,0.15);

<script>

let map;

const countryInfo = {

    hungary: {
        title: "다뉴브의 진주, 헝가리",

        lat: 47.4979,
        lng: 19.0402,
        zoom: 6,

        intro: "동유럽의 심장부인 헝가리는 수천 년의 역사와 찬란한 마자르 문화가 살아 숨 쉬는 곳입니다. 특히 밤이 되면 황금빛으로 물드는 부다페스트의 전경은 세상에서 가장 아름다운 야경 중 하나로 손꼽힙니다.",

        places:
        "• 부다페스트 국회의사당\n• 세체니 온천\n• 어부의 요새",

        food:
        "• 굴라쉬(Goulash)\n• 토카이 와인",

        imgPrefix: "hungary",
        imgCount: 5
    },

    czech: {
        title: "중세의 낭만, 체코",

        lat: 50.0755,
        lng: 14.4378,
        zoom: 6,

        intro: "붉은 지붕과 돌담길이 가득한 체코는 마치 시간이 멈춘 듯한 중세의 분위기를 간직하고 있습니다.",

        places:
        "• 프라하 성\n• 카를교\n• 구시가지 광장",

        food:
        "• 꼴레뇨\n• 체코 맥주\n• 뜨르들로",

        imgPrefix: "체코",
        imgCount: 6
    },

    austria: {
        title: "예술과 음악의 나라, 오스트리아",

        lat: 48.2082,
        lng: 16.3738,
        zoom: 6,

        intro: "모차르트와 베토벤의 선율이 흐르는 오스트리아는 알프스의 웅장한 대자연과 화려한 합스부르크 왕가의 역사가 공존하는 곳입니다.",

        places:
        "• 할슈타트\n• 쇤브룬 궁전\n• 벨베데레 궁전",

        food:
        "• 비너 슈니첼\n• 자허 토르테",

        imgPrefix: "오스트리아",
        imgCount: 9
    },

    newyork: {
        title: "세계의 교차로, 뉴욕 (미국)",

        lat: 40.7128,
        lng: -74.0060,
        zoom: 10,

        intro: "미국을 넘어 세계 경제와 문화의 중심지인 뉴욕은 끊임없이 변화하며 활력을 뿜어내는 도시입니다.",

        places:
        "• 타임스퀘어\n• 센트럴 파크\n• 자유의 여신상",

        food:
        "• 뉴욕 스타일 피자\n• 매그놀리아 컵케이크",

        imgPrefix: "뉴욕",
        imgCount: 7
    }
};

// 지도 생성
function initMap(lat, lng, zoom, title) {

    const location = {
        lat: lat,
        lng: lng
    };

    map = new google.maps.Map(
        document.getElementById("map"),
        {
            center: location,
            zoom: zoom,

            styles: [
                {
                    elementType: "geometry",
                    stylers: [{ color: "#ebe3cd" }]
                },
                {
                    elementType: "labels.text.fill",
                    stylers: [{ color: "#523735" }]
                },
                {
                    elementType: "labels.text.stroke",
                    stylers: [{ color: "#f5f1e6" }]
                }
            ]
        }
    );

    new google.maps.Marker({
        position: location,
        map: map,
        title: title,
        animation: google.maps.Animation.DROP
    });
}

// 나라 클릭
function showCountry(id) {

    const area =
    document.getElementById('content-area');

    const data =
    countryInfo[id];

    area.classList.remove('animate-in');

    setTimeout(() => {

        let galleryHtml =
        '<div class="photo-gallery">';

        for (let i = 1; i <= data.imgCount; i++) {

            const imgName =
            `${data.imgPrefix} (${i}).jpg`;

            galleryHtml += `
                <img
                    src="${imgName}"
                    class="gallery-item"
                    alt="${data.imgPrefix} ${i}"
                    onclick="openModal('${imgName}')"
                >
            `;
        }

        galleryHtml += '</div>';

        area.innerHTML = `

            <div class="country-title">
                ${data.title}
            </div>

            <p class="description-text"
               style="font-weight:bold;">
               ${data.intro}
            </p>

            <!-- 지도 -->
            <div id="map"></div>

            <span class="section-label">
                📸 여행의 기록
            </span>

            ${galleryHtml}

            <span class="section-label">
                🏛 가봐야 할 명소
            </span>

            <p class="description-text">
                ${data.places}
            </p>

            <span class="section-label">
                🍴 꼭 먹어봐야 할 음식
            </span>

            <p class="description-text">
                ${data.food}
            </p>
        `;

        area.classList.add('animate-in');

        // 지도 실행
        initMap(
            data.lat,
            data.lng,
            data.zoom,
            data.title
        );

        area.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
        });

    }, 50);
}

// 라이트박스 열기
function openModal(src) {

    const modal =
    document.getElementById('photoModal');

    const modalImg =
    document.getElementById('modalImg');

    modal.style.display = "flex";

    modalImg.src = src;
}

// 라이트박스 닫기
function closeModal() {

    document.getElementById('photoModal')
    .style.display = "none";
}

</script>
